# ============================================================================
# Docker Compose — Production Configuration
# ============================================================================
#
# Production overrides for the V3 CTI platform.
# Extends docker-compose.yml by overriding v3-api and v3-worker with:
#   - Resource limits (CPU/memory)
#   - Traefik reverse proxy (no exposed ports on API)
#   - Production-specific environment variables
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================================

services:
  # ==========================================================================
  # Reverse Proxy — Traefik (replaces GraphQL Mesh gateway)
  # ==========================================================================
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8888:8888" # Dev entrypoint (no TLS)
      - "8082:8080" # Dashboard (internal only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-letsencrypt:/letsencrypt
      - traefik-logs:/var/log/traefik
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # API Server — Production overrides
  # ==========================================================================
  v3-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@v3-pgbouncer:6432/rinjani_v3}
      - REDIS_QUEUE_URL=${REDIS_QUEUE_URL:-redis://v3-redis-queue:6379}
      - REDIS_CACHE_URL=${REDIS_CACHE_URL:-redis://v3-redis-cache:6379}
      - OPENSEARCH_URL=${OPENSEARCH_URL:-http://v3-opensearch:9200}
      - NEO4J_URI=${NEO4J_URI:-bolt://v3-neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-rinjani1}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - API_KEYS=${API_KEYS:-}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-}
      - VAULT_ADDR=${VAULT_ADDR:-}
      - VAULT_TOKEN=${VAULT_TOKEN:-}
      - MEILISEARCH_URL=${MEILISEARCH_URL:-}
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://v3-tempo:4318
      - OTEL_SERVICE_NAME=rinjani-api
      - SEARXNG_URL=http://v3-searxng:8080
      # ── Enrichment API Keys ──
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - VIRUSTOTAL_LIVEHUNT_API_KEY=${VIRUSTOTAL_LIVEHUNT_API_KEY:-}
      - ABUSECH_API_KEY=${ABUSECH_API_KEY:-}
      - RISKIQ_USER=${RISKIQ_USER:-}
      - RISKIQ_API_KEY=${RISKIQ_API_KEY:-}
      - RISKIQ_BASE_URL=${RISKIQ_BASE_URL:-https://api.riskiq.net/pt/v2}
      - GOOGLE_SAFE_BROWSING_API_KEY=${GOOGLE_SAFE_BROWSING_API_KEY:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - IPINFO_API_KEY=${IPINFO_API_KEY:-}
      - ZOOMEYE_API_KEY=${ZOOMEYE_API_KEY:-}
    # No published ports — all traffic routed through Traefik
    ports: !reset []
    expose:
      - "3001"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ==========================================================================
  # Worker — Production overrides
  # ==========================================================================
  v3-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: [ "./apps/api/node_modules/.bin/tsx", "apps/worker/src/index.ts", "--daemon" ]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@v3-pgbouncer:6432/rinjani_v3}
      - REDIS_QUEUE_URL=${REDIS_QUEUE_URL:-redis://v3-redis-queue:6379}
      - REDIS_CACHE_URL=${REDIS_CACHE_URL:-redis://v3-redis-cache:6379}
      - OPENSEARCH_URL=${OPENSEARCH_URL:-http://v3-opensearch:9200}
      - NEO4J_URI=${NEO4J_URI:-bolt://v3-neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-rinjani1}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-5}
      - ENABLE_FEED_SYNC=${ENABLE_FEED_SYNC:-true}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-3600000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SEARXNG_URL=${SEARXNG_URL:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://v3-tempo:4318
      - OTEL_SERVICE_NAME=rinjani-worker
      - NODE_PATH=/app/apps/api/node_modules
      # ── Enrichment API Keys ──
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - ABUSECH_API_KEY=${ABUSECH_API_KEY:-}
      - RISKIQ_USER=${RISKIQ_USER:-}
      - RISKIQ_API_KEY=${RISKIQ_API_KEY:-}
      - GOOGLE_SAFE_BROWSING_API_KEY=${GOOGLE_SAFE_BROWSING_API_KEY:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - IPINFO_API_KEY=${IPINFO_API_KEY:-}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

# ============================================================================
# Volumes
# ============================================================================
volumes:
  traefik-letsencrypt:
  traefik-logs:
