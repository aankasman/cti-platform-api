name: CI

# Triggers on pushes to master and every PR targeting master. The previous
# config triggered on `main` / `develop` which never exist on this repo, so
# nothing actually ran.

on:
  push:
    branches: [master]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/**'
      - 'tsconfig.base.json'
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same ref when a new push lands — avoids
# burning runner minutes on stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # pnpm version is intentionally NOT pinned here — `pnpm/action-setup@v4`
  # auto-reads `packageManager` from root `package.json` (currently
  # `pnpm@9.0.0`). Specifying both `version:` and `packageManager` causes
  # the action to bail with `ERR_PNPM_BAD_PM_VERSION`. Bump `packageManager`
  # in `package.json` to upgrade pnpm — CI will follow automatically.

jobs:
  # ------------------------------------------------------------------
  # Lint + TypeScript across the whole workspace.
  # ------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      # `packages/workbench-core` ships its declarations from `dist/index.d.ts`,
      # which is gitignored (built artifact). Without it, every dependent
      # typecheck below errors with `Cannot find module '@rinjani/workbench-core'`.
      # `build:lib` is the tsup step only (~3s) — we skip the heavier Vite UI
      # build since the typecheck doesn't need the bundled UI assets.
      - name: Build workbench-core lib (declarations)
        run: pnpm --filter @rinjani/workbench-core run build:lib

      - name: Typecheck (api)
        run: pnpm --filter @rinjani/api exec tsc --noEmit

      - name: Typecheck (worker)
        run: pnpm --filter @rinjani/worker exec tsc --noEmit

      - name: Typecheck (gateway)
        run: pnpm --filter @rinjani/gateway exec tsc --noEmit

      - name: ESLint
        run: pnpm lint
        # eslint config rules may surface as new errors when deps update —
        # don't block CI on them yet, but log them.
        continue-on-error: true

  # ------------------------------------------------------------------
  # Unit tests with a real Postgres service container.
  # ------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rinjani_v3_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      # Same reason as in the lint job — apps/api imports `@rinjani/workbench-core`
      # and vitest will fail at module load if the dist isn't present.
      - name: Build workbench-core lib
        run: pnpm --filter @rinjani/workbench-core run build:lib

      - name: Run migrations
        run: pnpm --filter @rinjani/db migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rinjani_v3_test

      # Most tests under apps/api/src/__tests__/ are integration tests that
      # `fetch('http://localhost:3001/health')` — they need the API
      # actually running. We start it in the background so the test step
      # can talk to it. tsx is faster than `pnpm build && node dist`
      # and matches what dev runs locally.
      - name: Start API in background
        run: pnpm --filter @rinjani/api dev > /tmp/api.log 2>&1 &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rinjani_v3_test
          REDIS_URL: redis://localhost:6379
          REDIS_QUEUE_URL: redis://localhost:6379
          REDIS_CACHE_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
          API_KEYS: test-api-key-for-integration-tests:admin
          NODE_ENV: test
          # Disable feed-sync + auto-enrich at boot — CI doesn't have OTX/NVD
          # keys and we don't want the scheduler firing during tests.
          FEED_SYNC_ENABLED: 'false'
          AUTO_ENRICH_ENABLED: 'false'

      # Poll /health until the API answers 200 (or 503 — service degradation
      # is fine, we only need the HTTP server up so tests can reach
      # individual endpoints). Cap at ~60s; if the server hasn't started
      # by then, print the log and fail.
      - name: Wait for API readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:3001/health \
               || curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health | grep -qE '^(200|503)$'; then
              echo "API responding on :3001"
              exit 0
            fi
            echo "waiting for API... ($i/30)"
            sleep 2
          done
          echo "::error::API failed to start in 60s. Recent log:"
          tail -100 /tmp/api.log || true
          exit 1

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rinjani_v3_test
          # Match dev defaults — see services/redis.ts for the split queue+cache pattern
          REDIS_URL: redis://localhost:6379
          REDIS_QUEUE_URL: redis://localhost:6379
          REDIS_CACHE_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
          NODE_ENV: test

      # Surface the API log even on success — useful for debugging
      # intermittent rate-limit / pool exhaustion issues we've seen.
      - name: API log (always)
        if: always()
        run: tail -200 /tmp/api.log || true

  # ------------------------------------------------------------------
  # Workbench-core UI build needs Node 20+ for the Tailwind 4 oxide
  # native binding; we re-run install on Node 20 to fetch the binary
  # that Node 18 silently skips.
  # ------------------------------------------------------------------
  build:
    name: Workspace build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  # ------------------------------------------------------------------
  # Dependency advisory check — runs `pnpm audit` against pinned floors
  # in package.json `pnpm.overrides`. Don't fail the build (some
  # advisories sit in deep transitives we can't override safely without
  # breaking the parent), but surface the count in the run log.
  # ------------------------------------------------------------------
  deps:
    name: Dependency advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (critical + high)
        run: pnpm audit --audit-level=high
        continue-on-error: true
