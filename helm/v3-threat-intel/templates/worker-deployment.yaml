{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "v3-threat-intel.fullname" . }}-worker
  labels:
    {{- include "v3-threat-intel.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "v3-threat-intel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "v3-threat-intel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "v3-threat-intel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          env:
            {{- range $key, $value := .Values.worker.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range .Values.worker.envSecrets }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: plugins
              mountPath: /app/plugins
      volumes:
        - name: tmp
          emptyDir: {}
        - name: plugins
          emptyDir: {}
{{- end }}
---
{{- if .Values.cronjobs.enabled }}
{{- if .Values.cronjobs.cisaSync.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "v3-threat-intel.fullname" . }}-cisa-sync
  labels:
    {{- include "v3-threat-intel.labels" . | nindent 4 }}
    app.kubernetes.io/component: cronjob
spec:
  schedule: {{ .Values.cronjobs.cisaSync.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cisa-sync
              image: {{ .Values.cronjobs.cisaSync.image }}
              command: {{ toYaml .Values.cronjobs.cisaSync.command | nindent 16 }}
              env:
                {{- range .Values.worker.envSecrets }}
                - name: {{ .name }}
                  valueFrom:
                    secretKeyRef:
                      name: {{ .secretName }}
                      key: {{ .secretKey }}
                {{- end }}
{{- end }}
