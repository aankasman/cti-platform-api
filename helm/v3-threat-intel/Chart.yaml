apiVersion: v2
name: v3-threat-intel
description: V3 Threat Intelligence API Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - threat-intelligence
  - security
  - api
  - cti

home: https://github.com/rinjanianalytics/cti-platform-api

sources:
  - https://github.com/rinjanianalytics/cti-platform-api

maintainers:
  - name: RinjaniAnalytics Team
    email: support@rinjanianalytics.io

dependencies:
  - name: postgresql
    version: "14.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "18.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: opensearch
    version: "2.17.0"
    repository: https://opensearch-project.github.io/helm-charts
    condition: opensearch.enabled
