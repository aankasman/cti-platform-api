# Prometheus Configuration — Rinjani CTI Platform
#
# !! TEMPLATE FILE — DO NOT EDIT THE RENDERED prometheus.yml !!
#
# The v3-prometheus container substitutes ${PROMETHEUS_SCRAPE_API_KEY}
# at startup via `sed` and writes the result to /tmp/prometheus.yml,
# which Prometheus actually reads. This keeps the API key out of the
# YAML in the repo. See docker-compose.yml -> v3-prometheus.command.
#
# To configure (local dev):
#   1. Pick a dedicated scrape key (e.g. `prom-scrape-$(openssl rand -hex 16)`)
#   2. Add it to API_KEYS in .env:
#        API_KEYS=existing-key:admin,prom-scrape-XXXX:viewer
#   3. Mirror it into PROMETHEUS_SCRAPE_API_KEY in .env
#   4. Restart prometheus:  docker compose --profile telemetry up -d v3-prometheus
#
# Scrapes metrics from:
#   - API server (custom metrics + OTEL)
#   - Redis / PostgreSQL / OpenSearch exporters (telemetry profile)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alert rules
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # API Server metrics (runs on host, not in Docker)
  - job_name: 'rinjani-api'
    metrics_path: '/v1/ops/metrics/prometheus'
    scheme: http
    static_configs:
      - targets: ['host.docker.internal:3001']
        labels:
          service: 'rinjani-api'
          env: 'development'
    scrape_interval: 15s
    params:
      # Substituted at container startup from the PROMETHEUS_SCRAPE_API_KEY
      # env var. The literal `${PROMETHEUS_SCRAPE_API_KEY}` is NOT what gets
      # sent — see prometheus.template.yml header for setup.
      api_key: ['${PROMETHEUS_SCRAPE_API_KEY}']

  # Traefik metrics (enable when gateway profile is active)
  # - job_name: 'traefik'
  #   static_configs:
  #     - targets: ['v3-traefik:8080']
  #   metrics_path: '/metrics'
  #   scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis Exporter — native Redis metrics (memory, clients, ops/sec)
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['v3-redis-exporter:9121']
        labels:
          service: 'redis'
          env: 'development'

  # PostgreSQL Exporter — native PG metrics (connections, locks, replication)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['v3-postgres-exporter:9187']
        labels:
          service: 'postgresql'
          env: 'development'

  # OpenSearch Exporter — cluster health, indices, shards
  - job_name: 'opensearch-exporter'
    static_configs:
      - targets: ['v3-opensearch-exporter:9114']
        labels:
          service: 'opensearch'
          env: 'development'
