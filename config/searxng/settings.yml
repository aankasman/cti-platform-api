## SearXNG Configuration
# Self-hosted metasearch engine for Nexus Intelligence

use_default_settings: true

general:
  instance_name: "Rinjani CTI Search"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "rinjani-searxng-secret-key-change-in-prod"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

# Enable search engines optimized for CTI/OSINT
engines:
  # Web search
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  # News/Articles
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false

  - name: bing news
    engine: bing_news
    shortcut: bn
    disabled: false

  # Social / Forums
  - name: reddit
    engine: reddit
    shortcut: re
    disabled: false

  # IT / Security specific
  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  # Disable engines that are slow or low-value for CTI
  - name: dailymotion
    disabled: true

  - name: deviantart
    disabled: true

  - name: flickr
    disabled: true

  - name: unsplash
    disabled: true

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
