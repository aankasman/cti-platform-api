; ============================================================================
; PgBouncer Configuration for Rinjani CTI Platform
; ============================================================================
;
; Connection pooling for PostgreSQL to prevent connection exhaustion
; under load. Uses transaction pooling for optimal throughput.
;
; Docs: https://www.pgbouncer.org/config.html

[databases]
; Proxy "rinjani_v3" to the upstream PostgreSQL container
rinjani_v3 = host=v3-postgres port=5432 dbname=rinjani_v3

[pgbouncer]
; Listen on all interfaces inside the container
listen_addr = 0.0.0.0
listen_port  = 6432

; Authentication — trust within Docker network (postgres handles real auth)
auth_type  = md5
auth_file  = /etc/pgbouncer/userlist.txt

; Pool mode: transaction (each txn gets a connection, then releases)
pool_mode = transaction

; Pool sizing
default_pool_size    = 20
min_pool_size        = 5
max_client_conn      = 200
max_db_connections    = 50
reserve_pool_size    = 5
reserve_pool_timeout = 3

; Timeouts (seconds)
server_connect_timeout = 5
server_idle_timeout    = 300
server_lifetime        = 3600
client_idle_timeout    = 300
query_timeout          = 60
query_wait_timeout     = 30

; Admin console (for monitoring)
admin_users   = pgbouncer
stats_users   = pgbouncer

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors  = 1
verbose = 0
