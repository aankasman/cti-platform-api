; ============================================================================
; PgBouncer Configuration for Rinjani CTI Platform — REFERENCE TEMPLATE
; ============================================================================
;
; NOT MOUNTED by default. The compose service `v3-pgbouncer` lets the
; edoburu image generate its own pgbouncer.ini from DATABASE_URL +
; AUTH_TYPE=scram-sha-256 + LISTEN_PORT=6432, which avoids the
; SCRAM/md5 + LISTEN_PORT footguns we hit on 2026-06-01.
;
; Kept here for operators who want to override the auto-generated file
; (custom pool sizes, multiple databases, auth_query against pg_shadow,
; etc). To activate, re-add the bind mount in docker-compose.yml:
;   - ./config/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
;
; Docs: https://www.pgbouncer.org/config.html

[databases]
; Proxy "rinjani_v3" to the upstream PostgreSQL container
rinjani_v3 = host=v3-postgres port=5432 dbname=rinjani_v3

[pgbouncer]
; Listen on all interfaces inside the container
listen_addr = 0.0.0.0
listen_port  = 6432

; Authentication. postgres:16 issues SCRAM-SHA-256 hashes by default; using
; auth_type = md5 here will yield "wrong password type" on connect. If you
; switch back to a static userlist, regenerate hashes accordingly.
auth_type  = scram-sha-256
auth_file  = /etc/pgbouncer/userlist.txt

; Pool mode: transaction (each txn gets a connection, then releases)
pool_mode = transaction

; Pool sizing
default_pool_size    = 20
min_pool_size        = 5
max_client_conn      = 200
max_db_connections    = 50
reserve_pool_size    = 5
reserve_pool_timeout = 3

; Timeouts (seconds)
server_connect_timeout = 5
server_idle_timeout    = 300
server_lifetime        = 3600
client_idle_timeout    = 300
query_timeout          = 60
query_wait_timeout     = 30

; Admin console (for monitoring)
admin_users   = pgbouncer
stats_users   = pgbouncer

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors  = 1
verbose = 0
